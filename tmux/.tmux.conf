# NOTE: history-limit, escape-time, status-interval, display-time, focus-events,
# aggressive-resize, emacs command-prompt keys + a `prefix + R` reload binding
# now come from tmux-sensible (see plugins below) — removed from here so it owns them.

# mouse support (scroll, resize panes, select)
set -g mouse on

# ---- system clipboard integration ----
# Copy (mouse-drag or copy-mode 'y') goes to the OS clipboard; paste with the
# terminal's Ctrl+Shift+V. NOTE: Ctrl+Shift+C/V are the terminal's shortcuts,
# not tmux's — tmux can't bind them; this just makes selections system-wide.
set -g set-clipboard on          # also emit OSC 52 (SSH / OSC52-capable terminals)

# pick the OS clipboard writer (later match wins → correct tool per platform)
if-shell 'command -v xsel'                                 'set -g copy-command "xsel --clipboard --input"'
if-shell 'command -v xclip'                                'set -g copy-command "xclip -selection clipboard -in"'
if-shell '[ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy' 'set -g copy-command "wl-copy"'
if-shell 'command -v pbcopy'                               'set -g copy-command "pbcopy"'

# route mouse-drag and 'y' through copy-command (copy-selection-* ignores it; copy-pipe-* uses it)
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel
bind -T copy-mode    y                 send -X copy-pipe-and-cancel
bind -T copy-mode-vi y                 send -X copy-pipe-and-cancel

# start numbering at 1, renumber when a window closes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ===============================================================
#  Ayu Mirage theme   bg #2E3436 . fg #CCCAC2 . accent #ffcc66
#  NOTE: keep gold hex LOWERCASE (#ffcc66/#ffd173). In status-left/right
#  format strings tmux reads an uppercase "#F.." as the #F (window-flags)
#  variable, mangling the color to "*FCC66". Lowercase #f is not a format key.
# ===============================================================
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#2E3436,fg=#CCCAC2"
set -g status-left-length 40
set -g status-right-length 120

# left: session name in a gold block, then a powerline arrow into the bar
set -g status-left "#[fg=#2E3436,bg=#ffcc66,bold] #S #[fg=#ffcc66,bg=#2E3436,nobold] "

# windows — inactive: muted text on bar bg
set -g window-status-style "fg=#707A8C,bg=#2E3436"
set -g window-status-format " #I #W "
set -g window-status-separator ""

# windows — active: slate block bracketed by powerline arrows
set -g window-status-current-format "#[fg=#2E3436,bg=#33415E]#[fg=#ffcc66,bg=#33415E,bold] #I #W #[fg=#33415E,bg=#2E3436]"

# right: autosave . hostname . date/time  (left-pointing arrows, ending gold)
set -g status-right "#[fg=#33415E,bg=#2E3436]#[fg=#CCCAC2,bg=#33415E] ⟳ #{@continuum-save-interval}m #[fg=#5CCFE6,bg=#33415E]#[fg=#2E3436,bg=#5CCFE6,bold] #h #[fg=#ffcc66,bg=#5CCFE6]#[fg=#2E3436,bg=#ffcc66,bold] %a %b %d · %H:%M "

# pane borders
set -g pane-border-style "fg=#33415E"
set -g pane-active-border-style "fg=#ffcc66"

# messages / command prompt
set -g message-style "fg=#2E3436,bg=#ffcc66,bold"
set -g message-command-style "fg=#CCCAC2,bg=#33415E"

# copy-mode selection + clock
set -g mode-style "fg=#2E3436,bg=#ffd173"
set -g clock-mode-colour "#5CCFE6"
set -g clock-mode-style 24

# keep resurrect/continuum config here later
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'  # sensible defaults; load first (right after tpm)
set -g @plugin 'sainnhe/tmux-fzf'            # fzf-driven session/window/pane menus (prefix + F); needs fzf
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'      # auto-restore when tmux server starts
set -g @continuum-save-interval '5' # snapshot every 5 min

run '~/.tmux/plugins/tpm/tpm'       # keep this line LAST
